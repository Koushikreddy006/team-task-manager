<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Task Dashboard</h2>

    <div class="text-end mb-3">
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <!-- Add Task -->
    <form method="POST" action="/add_task" class="d-flex mb-4">
        <input name="title" class="form-control me-2" placeholder="Enter task">
        <button class="btn btn-primary">Add Task</button>
    </form>

    <!-- Task List -->
    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            
            <span>
                {{ task.title }} 
                {% if task.status == "Done" %}
                    <span class="badge bg-success">Done</span>
                {% else %}
                    <span class="badge bg-warning">Pending</span>
                {% endif %}
            </span>

            <div>
                {% if task.status != "Done" %}
                <a href="/complete_task/{{ task.id }}" class="btn btn-success btn-sm">Done</a>
                {% endif %}
                
                <a href="/delete_task/{{ task.id }}" class="btn btn-danger btn-sm">Delete</a>
            </div>

        </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
